<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CARE BRIDGE • Home</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body {
            font-size: 1.1rem;
        }

        .dashboard {
            padding-top: 110px;
        }
    </style>
</head>

<body>

    <!-- Simple top bar -->
    <nav class="dashboard-nav">
        <div class="dash-container" style="text-align:center; font-size:1.4rem; font-weight:600;">
            CARE BRIDGE — Good Afternoon
        </div>
    </nav>

    <main class="dashboard elderly-dashboard">

        <div class="dash-container">

            <h1 style="font-size:3.2rem; margin:1rem 0;">How are you feeling?</h1>
            <div class="status-large">All good!</div>

            <button class="big-button big-sos">
                <i class="fas fa-exclamation-triangle" style="margin-right:12px;"></i>
                HELP! I need assistance
            </button>

            <button class="big-button big-video">
                <i class="fas fa-video" style="margin-right:12px;"></i>
                Call my daughter now
            </button>

            <button class="big-button big-med">
                <i class="fas fa-pills" style="margin-right:12px;"></i>
                I took my medicines
            </button>

            <button class="big-button" style="background:#10b981; color:white;">
                <i class="fas fa-comment-medical" style="margin-right:12px;"></i>
                Tell nurse how I feel
            </button>

            <p style="margin-top:3rem; color:#64748b; font-size:1.1rem;">
                Last check-in: 42 minutes ago<br>
                Weather today: 28°C • Sunny
            </p>

        </div>

    </main>

</body>

</html>
